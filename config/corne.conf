# Configuración general para Corne Fran (nombre personalizado del teclado)
CONFIG_ZMK_KEYBOARD_NAME="Corne Fran"

### Alimentación y energía
# Desactiva la alimentación externa cuando no se use USB
# Esto evita que el teclado entre en modo de alimentación externa cuando no esté conectado a USB
# CONFIG_ZMK_EXT_POWER_USB_ONLY=y

# Desactiva el modo de suspensión
CONFIG_ZMK_SLEEP=Y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=500  # No entra en suspensión después de inactividad

### RGB UNDERGLOW (RGB siempre encendido)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Desactivar el apagado automático del RGB al estar inactivo
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Efecto: 0 = Color sólido (RGB siempre encendido)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0

# Configuración del brillo: 100% (máximo brillo)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# Saturación máxima (100%)
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100

# Tono de color (240 es azul, puedes cambiarlo a cualquier valor de 0 a 359 para otro color)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=240

# Configuración del paso de tono y saturación (para transición suave si se usan efectos)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=2

### Pantalla OLED (Si la usas)
CONFIG_ZMK_DISPLAY=y

### Widgets (si usas pantalla OLED)
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

### HID para compatibilidad con nice!view y ePaperDisplay
# Habilitar el rebote "eager" para mejorar el tiempo de respuesta
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=0
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

### Bluetooth (si no usas Bluetooth, desactívalo completamente)
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=n
# CONFIG_BT_MAX_CONN=0

### Configuración adicional para mejorar compatibilidad con dispositivos como iPad
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Configuración de Sleep (no aplicar si no se usa energía externa o quieres desactivar todo ahorro de energía)
# CONFIG_ZMK_EXT_POWER=y  # Si necesitas poder del puerto USB, esto no debería estar activado
